<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin:0; overflow:hidden; font-family: monospace; background:#000; }
    #info {
        position:absolute; bottom:20px; left:20px; color:white;
        background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; font-size:11px;
    }
    .status {
        position:absolute; top:20px; right:20px; color:#0f0;
        background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:5px; font-size:10px;
    }
</style>
</head>
<body>

<strong>LEFT: Source Video | RIGHT: Elevation Map</strong><br>
  <strong>Exercise 3: Lambertian Lighting on Elevation Maps</strong><br>
<div class="status" id="status">Space: RGB | Lighting: Active</div>

<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
 "imports": {
   "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
 }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from "three/addons/libs/lil-gui.module.min.js";
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { HTMLMesh } from 'three/addons/interactive/HTMLMesh.js';
import { InteractiveGroup } from 'three/addons/interactive/InteractiveGroup.js';

const CONFIG = {
    resolution: 120,   // how dense the grid is (more = smoother but heavier)
    heightScale: 0.3   // how much we exaggerate the elevation
};

// list of supported color spaces
const SPACES = ['RGB','HSV','CIEXYZ','CIExyY','CIELab','CIELCH'];


let scene, camera, renderer, controls;
let video, videoTexture;
let elevationMesh, elevationMaterial;
let colorSpace = { current: 'RGB' };

init();

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);

    // front-facing view this time 
    camera.position.set(0, 0, 4); 

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // enable XR
    renderer.xr.enabled = true;

    // add VR button
    document.body.appendChild(VRButton.createButton(renderer));

    // orbit controls for quick inspection
    controls = new OrbitControls(camera, renderer.domElement);


    // video setup (used as dynamic texture)
    video = document.createElement('video');
    video.src = "video.mp4"; // make sure path is correct
    video.loop = true;
    video.muted = true;
    video.crossOrigin = "anonymous";

    // wait until video is ready before building the scene
    video.onloadeddata = () => {
        videoTexture = new THREE.VideoTexture(video);
        setupObjects(); 
        
        const group = new InteractiveGroup(renderer, camera);
        scene.add(group);
        setupGUI(group); 

        video.play();
        renderer.setAnimationLoop(animate);
    };
    
}

// SHADER PIPELINE
//all color conversions handled on GPU
function setupObjects(){

// conversion helpers (standard formulas)
const GLSL = `
vec3 rgb2hsv(vec3 c){
    vec4 K = vec4(0., -1./3., 2./3., -1.);
    vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b,c.g));
    vec4 q = mix(vec4(p.xyw,c.r), vec4(c.r,p.yzx), step(p.x,c.r));
    float d = q.x - min(q.w,q.y);
    float e = 1e-10;
    return vec3(abs(q.z + (q.w-q.y)/(6.*d+e)), d/(q.x+e), q.x);
}
vec3 rgb2xyz(vec3 c){
    c = mix(c/12.92, pow((c+0.055)/1.055, vec3(2.4)), step(0.04045,c));
    return vec3(dot(c, vec3(0.4124,0.3576,0.1805)), dot(c, vec3(0.2126,0.7152,0.0722)), dot(c, vec3(0.0193,0.1192,0.9505)));
}
vec3 xyz2xyY(vec3 xyz){
    float sum = xyz.x + xyz.y + xyz.z;
    if(sum == 0.0) return vec3(0.0,0.0,xyz.y);
    return vec3(xyz.x/sum, xyz.y/sum, xyz.y);
}
float fLab(float t){ return t > 0.008856 ? pow(t,1.0/3.0) : (7.787*t + 16.0/116.0); }
vec3 xyz2lab(vec3 xyz){
    vec3 ref = vec3(0.95047,1.0,1.08883);
    vec3 v = vec3(fLab(xyz.x/ref.x), fLab(xyz.y/ref.y), fLab(xyz.z/ref.z));
    return vec3(116.0*v.y - 16.0, 500.0*(v.x - v.y), 200.0*(v.y - v.z));
}
vec3 lab2lch(vec3 lab){
    float C = length(lab.yz);
    float H = atan(lab.z, lab.y);
    if(H < 0.0) H += 6.2831853;
    return vec3(lab.x, C, H / 6.2831853);
}
vec3 convert(vec3 rgb, int s){
    if(s==0) return rgb;
    if(s==1) return rgb2hsv(rgb);
    vec3 xyz = rgb2xyz(rgb);
    if(s==2) return xyz;
    if(s==3) return xyz2xyY(xyz);
    vec3 lab = xyz2lab(xyz);
    if(s==4) return lab;
    if(s==5) return lab2lch(lab);
    return rgb;
}
vec3 normalizeSpace(vec3 v, int s){
    if(s==0 || s==1) return v;
    if(s==2) return v / vec3(0.95,1.0,1.1);
    if(s==3) return v / vec3(0.8,0.9,1.0);
    if(s==4) return vec3(v.x/100.0,(v.y+128.0)/255.0,(v.z+128.0)/255.0);
    if(s==5) return vec3(v.x/100.0,v.y/150.0,v.z);
    return v;
}
`;

//ELEVATION + LIGHTING

elevationMaterial = new THREE.ShaderMaterial({
uniforms:{
    uVideo:{value:videoTexture},
    uHeight:{value:CONFIG.heightScale},
    uSpace:{value:0},
    uChannel:{value:0},

    // simple lighting params
    uLightDir: { value: new THREE.Vector3(1, 1, 1).normalize() },
    uLightColor: { value: new THREE.Vector3(1, 1, 1) },
    uKd: { value: 1.0 },  // diffuse strength
    uKa: { value: 0.15 }  // ambient base light
},

vertexShader:`
uniform sampler2D uVideo;
uniform float uHeight;
uniform int uSpace;
uniform int uChannel;
uniform vec3 uLightDir;
varying vec3 vColor;
varying float vLighting;

${GLSL}

void main(){
    float delta = 1.0 / ${CONFIG.resolution.toFixed(1)};

    vec3 rgb = texture2D(uVideo, uv).rgb;
    float h = normalizeSpace(convert(rgb, uSpace), uSpace)[uChannel];

    // Finite Difference for Normals
    float hL = normalizeSpace(convert(texture2D(uVideo, uv + vec2(-delta,0.0)).rgb, uSpace), uSpace)[uChannel];
    float hR = normalizeSpace(convert(texture2D(uVideo, uv + vec2(delta,0.0)).rgb, uSpace), uSpace)[uChannel];
    float hD = normalizeSpace(convert(texture2D(uVideo, uv + vec2(0.0,-delta)).rgb, uSpace), uSpace)[uChannel];
    float hU = normalizeSpace(convert(texture2D(uVideo, uv + vec2(0.0, delta)).rgb, uSpace), uSpace)[uChannel];

    float dhdu = (hR - hL) * uHeight;
    float dhdv = (hU - hD) * uHeight;

    vec3 N = normalize(vec3(-dhdu, -dhdv, 1.0));
    vec3 L = normalize(uLightDir);
    vLighting = max(dot(N, L), 0.0);

    vec3 pos = position;
    pos.z = h * uHeight;
    vColor = rgb;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos,1.0);
}`,
fragmentShader:`
uniform vec3 uLightColor;
uniform float uKd;
uniform float uKa;
varying vec3 vColor;
varying float vLighting;

void main(){
    vec3 lighting = uLightColor * (uKa + uKd * vLighting);
    gl_FragColor = vec4(vColor * lighting, 1.0);
}`,
side:THREE.DoubleSide
});

// mesh grid that gets deformed + lit
const elevGeo = new THREE.PlaneGeometry(1.6, 1, CONFIG.resolution, CONFIG.resolution);

elevationMesh = new THREE.Mesh(elevGeo, elevationMaterial);

// put it in the right 
elevationMesh.position.set(1.5, 1, -2); 

scene.add(elevationMesh);

// ORIGINAL VIDEO as a reference
const vp = new THREE.Mesh(
    new THREE.PlaneGeometry(1.6, 1),
    new THREE.MeshBasicMaterial({map:videoTexture})
);
// left side = original input
vp.position.set(-1.5, 1, -2);
scene.add(vp);
}

//VR UI LAYER
function setupGUI(group){
    // create lil-gui panel
    const gui = new GUI();

    // quick video control (just toggle play/pause)
    const vCtrl = { 
        pause: () => video.paused ? video.play() : video.pause() 
    };
    gui.add(vCtrl, 'pause').name('⏯ Play/Pause');

    // --- color space selection ---
    // instead of dropdown, using buttons (one per space)
    const spaceFolder = gui.addFolder('Color Spaces');

    SPACES.forEach((name, index) => {
        const obj = {};

        // each button switches the shader uniform
        obj[name] = () => {
            colorSpace.current = name;

            // tell shader which space to use
            elevationMaterial.uniforms.uSpace.value = index;

            updateStatus(); // update text display
        };

        spaceFolder.add(obj, name);
    });

    spaceFolder.open();

    // --- elevation channel selection ---
    // choose which component (x/y/z) becomes height
    const chanFolder = gui.addFolder('Elevation Channel');

    ['CH 1', 'CH 2', 'CH 3'].forEach((name, index) => {
        const obj = {};

        obj[name] = () => {
            elevationMaterial.uniforms.uChannel.value = index;
        };

        chanFolder.add(obj, name);
    });

    chanFolder.open();

    // --- height scaling ---
    // controls how "tall" the surface looks
    gui.add(CONFIG, 'heightScale', 0.1, 2.0)
        .name('Height')
        .onChange(v => {
            elevationMaterial.uniforms.uHeight.value = v;
        });

    // --- lighting params ---
    // basic Lambert controls (diffuse + ambient)
    gui.add(elevationMaterial.uniforms.uKd, 'value', 0, 2)
        .name("Diffuse");

    gui.add(elevationMaterial.uniforms.uKa, 'value', 0, 1)
        .name("Ambient");

    // --- attach GUI to 3D world (for VR) ---
    // turns HTML panel into a 3D object
    const guiMesh = new HTMLMesh(gui.domElement);

    // position it in front of the user
    guiMesh.position.set(0, 1.5, -0.8);

    // scale up so it's readable in VR
    guiMesh.scale.setScalar(2.5);

    group.add(guiMesh);

    // --- VR controllers ---
    // simple laser pointer for interaction
    for (let i = 0; i < 2; i++) {

        const c = renderer.xr.getController(i);

        // draw a line forward (like a ray)
        const line = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0),
                new THREE.Vector3(0,0,-5)
            ]),
            new THREE.LineBasicMaterial({color:0x00ff00})
        );

        c.add(line);

        scene.add(c);
        group.add(c); // attach to same group as GUI
    }
}

function updateStatus(){
    document.getElementById('status').innerText = `Space: ${colorSpace.current}`;
}

function animate(){
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
</html>
